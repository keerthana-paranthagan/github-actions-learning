name: Python CI

on:
  push:

jobs:
  test-python:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run Application
        run: python pythonCI/app.py